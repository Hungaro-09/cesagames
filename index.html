<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CESA GAMES</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #2D0B43;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #4285F4;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background-color: #357ae8;
        }
    </style>
</head>
<body>
    <header>
    <h1>CESA GAMES</h1>
    <nav>
        <ul>
            <li><a href="#">Início</a></li>
            <li><a href="#">Sobre</a></li>
        </ul>
    </nav>
    </header>

    <div class="container">
        <p>O cesa games veio com o intuito de ensinar se divertindo
            jogos com cunho pedagogico ou para melhorar a vida dos alunos e da comunidade externa.
        </p>
        <button id="meuBotao">Clique em mim</button>
        <p id="mensagem"></p>
    </div>

    <script>
        document.getElementById('meuBotao').addEventListener('click', function() {
            document.getElementById('mensagem').innerText = 'Código HTML testado com sucesso!';
        });
    </script>
</body>
</html>
